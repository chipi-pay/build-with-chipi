name: Unlock Next Tutorial
on:
  issue_comment:
    types: [created]
permissions:
  issues: write
  contents: read
jobs:
  check-unlock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check unlock phrase
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const comment = context.payload.comment.body.trim().toLowerCase();
            const issueNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;
            if (commenter === 'github-actions[bot]') return;
            const templatesDir = '.github/tutorial-templates';
            const templateFiles = fs.readdirSync(templatesDir).filter(f => f.endsWith('.json'));
            for (const file of templateFiles) {
              const template = JSON.parse(fs.readFileSync(path.join(templatesDir, file), 'utf-8'));
              if (comment.includes(template.unlock_phrase)) {
                const nextTemplateFile = template.next_template;
                if (!nextTemplateFile) {
                  await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body: '🎉 Congratulations @' + commenter + '! You completed ALL tutorials. 100% coverage.\n\n@haycarlitos — May completed the full series!' });
                  return;
                }
                const nextTemplate = JSON.parse(fs.readFileSync(path.join(templatesDir, nextTemplateFile), 'utf-8'));
                const newIssue = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: nextTemplate.title, body: nextTemplate.body, labels: nextTemplate.labels, assignees: [nextTemplate.assignee] });
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body: '✅ @haycarlitos — @' + commenter + ' unlocked the next tutorial!\n\n➡️ Next: ' + newIssue.data.title + ' (#' + newIssue.data.number + ')' });
                return;
              }
            }
            if (comment.toLowerCase().includes('blocked')) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body: '⚠️ @haycarlitos — @' + commenter + ' is blocked on this tutorial.' });
            }
