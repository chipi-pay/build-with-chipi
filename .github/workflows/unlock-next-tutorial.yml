name: Unlock Next Tutorial

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  check-unlock:
    runs-on: ubuntu-latest
    if: "!github.event.comment.user.login == 'github-actions[bot]'"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check unlock phrase
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const comment = context.payload.comment.body.trim().toLowerCase();
            const issueNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;
            
            // Load all template files to find which one maps to this issue
            const templatesDir = '.github/tutorial-templates';
            const templateFiles = fs.readdirSync(templatesDir).filter(f => f.endsWith('.json'));
            
            // We need to find which template was used to create this issue
            // by matching the unlock_phrase in the comment
            for (const file of templateFiles) {
              const template = JSON.parse(fs.readFileSync(path.join(templatesDir, file), 'utf-8'));
              
              if (comment.includes(template.unlock_phrase)) {
                // Found the matching template — now create the next issue
                const nextTemplateFile = template.next_template;
                
                if (!nextTemplateFile) {
                  // Last tutorial — congratulate!
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `🎉 **Congratulations @${commenter}!** You've completed ALL tutorials. 100% coverage achieved.\n\n@haycarlitos — May has completed the full tutorial series!`
                  });
                  return;
                }
                
                // Load the next template
                const nextTemplate = JSON.parse(
                  fs.readFileSync(path.join(templatesDir, nextTemplateFile), 'utf-8')
                );
                
                // Create the next issue
                const newIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: nextTemplate.title,
                  body: nextTemplate.body,
                  labels: nextTemplate.labels,
                  assignees: [nextTemplate.assignee]
                });
                
                // Comment on the current issue
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `✅ **@haycarlitos** — @${commenter} unlocked the next tutorial!\n\n➡️ Next task: ${newIssue.data.title} (#${newIssue.data.number})`
                });
                
                console.log(`Created issue #${newIssue.data.number}: ${newIssue.data.title}`);
                return;
              }
            }
            
            // Also check for BLOCKED keyword
            if (comment.toLowerCase().includes('blocked')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⚠️ **@haycarlitos** — @${commenter} is blocked on this tutorial. Please check the comment above.`
              });
            }
